<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gantt Chart</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Material Design Icons (Vuetify default icon set) -->
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css" rel="stylesheet" />

  <!-- Vuetify 4 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/vuetify@4/dist/vuetify.min.css" rel="stylesheet" />

  <!-- vis-timeline CSS -->
  <link href="https://cdn.jsdelivr.net/npm/vis-timeline@8/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    :root {
      --c-name: 168px;
      --c-assignee: 120px;
      --c-status: 120px;
      --line: #EEF1F5;
      --line-strong: #E2E8F0;
      --ink: #0F172A;
      --ink-2: #475569;
      --ink-3: #64748B;
    }

    html, body { margin: 0; padding: 0; }
    [v-cloak] { display: none; }

    .v-application,
    .v-application__wrap { font-family: 'Noto Sans JP', system-ui, -apple-system, "Segoe UI", sans-serif !important; }
    body { background: #F7F8FB; }

    /* ---------- App bar ---------- */
    .app-bar { background: #FFFFFF !important; border-bottom: 1px solid var(--line-strong); }
    .brand { font-size: 22px; font-weight: 700; color: var(--ink); letter-spacing: .2px; }
    .brand-avatar { font-weight: 600; }

    /* ---------- Page ---------- */
    .page { max-width: 1480px; margin: 0 auto; padding: 28px 32px 48px; }

    /* ---------- Controls ---------- */
    .controls { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 22px; flex-wrap: wrap; }
    .ctrl-label { font-size: 13px; color: var(--ink-3); margin-bottom: 7px; font-weight: 500; }
    .period-field { width: 280px; }
    .project-select { width: 240px; }
    .ctrl-action { margin-left: auto; }
    .add-btn { letter-spacing: .2px; font-weight: 600; }

    /* ---------- Gantt card ---------- */
    .gantt-card { border: 1px solid var(--line-strong); overflow: hidden; }
    .gantt-wrap { position: relative; }

    /* column header overlay (sits over the empty top-left corner of vis-timeline) */
    .col-header {
      position: absolute; top: 0; left: 0; z-index: 6;
      display: grid;
      grid-template-columns: var(--c-name) var(--c-assignee) var(--c-status);
      background: #FFFFFF;
      border-right: 1px solid var(--line-strong);
      border-bottom: 1px solid var(--line-strong);
      box-sizing: border-box;
    }
    .ch-cell {
      display: flex; align-items: center;
      padding: 0 14px;
      font-size: 13px; font-weight: 600; color: var(--ink-2);
      border-right: 1px solid var(--line);
      box-sizing: border-box;
    }
    .ch-cell:last-child { border-right: none; }

    #timeline { width: 100%; }
    .load-error { padding: 40px; text-align: center; color: #64748B; font-size: 14px; }

    /* ---------- vis-timeline overrides ---------- */
    .vis-timeline { border: none; font-family: 'Noto Sans JP', system-ui, sans-serif; }

    .vis-panel.vis-left { border-right: 1px solid var(--line-strong); }
    .vis-panel.vis-top { border-bottom: 1px solid var(--line-strong); }

    /* group label cells */
    .vis-labelset .vis-label { padding: 0; border-bottom: 1px solid var(--line); }
    .vis-labelset .vis-label .vis-inner { display: block; width: 100%; height: 100%; padding: 0; }
    .vis-foreground .vis-group { border-bottom: 1px solid var(--line); }

    .row-grid {
      display: grid;
      grid-template-columns: var(--c-name) var(--c-assignee) var(--c-status);
      align-items: center;
      height: 100%;
      box-sizing: border-box;
    }
    .rg-cell {
      padding: 0 14px; height: 100%;
      display: flex; align-items: center;
      border-right: 1px solid var(--line);
      box-sizing: border-box;
      font-size: 14px;
    }
    .rg-cell:last-child { border-right: none; }
    .rg-name { color: #1E293B; font-weight: 500; }
    .rg-assignee { color: #334155; }

    /* status chips */
    .chip { display: inline-block; padding: 3px 11px; border-radius: 999px; font-size: 12px; font-weight: 600; line-height: 1.5; }
    .chip-done  { color: #15803D; background: #DCFCE7; }
    .chip-doing { color: #1D4ED8; background: #DBEAFE; }
    .chip-todo  { color: #475569; background: #EDF1F6; }

    /* time axis */
    .vis-time-axis .vis-text { color: var(--ink-3); font-size: 12px; }
    .vis-time-axis .vis-text.vis-major { color: #1E293B; font-weight: 600; font-size: 13px; }
    .vis-time-axis .vis-grid.vis-minor { border-color: #F1F5F9; }
    .vis-time-axis .vis-grid.vis-major { border-color: var(--line-strong); }
    .vis-panel.vis-background .vis-grid.vis-vertical { border-color: #F4F6F9; }
    /* weekend labels in red (best-effort: vis adds weekday classes) */
    .vis-time-axis .vis-text.vis-saturday,
    .vis-time-axis .vis-text.vis-sunday { color: #EF4444; }

    /* weekend column shading (via background items, reliable) */
    .vis-item.weekend-bg { background-color: rgba(15, 23, 42, 0.035); border: none; }

    /* task bars */
    .vis-item.vis-range {
      border: none;
      border-radius: 7px;
      height: 26px;
      top: 50% !important;            /* vertical-center within the row */
      transform: translateY(-50%);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.18);
      color: #fff;
      cursor: grab;
      transition: box-shadow .15s ease, filter .15s ease;
    }
    .vis-item.vis-range:hover { filter: brightness(1.03); box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22); }
    .vis-item.vis-range.vis-selected { box-shadow: 0 0 0 2px rgba(37, 99, 235, .45), 0 2px 6px rgba(15,23,42,.2); }
    .vis-item .vis-item-content { padding: 0; }
    .vis-item.vis-range.vis-editable.vis-selected { cursor: grabbing; }

    /* today marker */
    .vis-custom-time.today { background-color: #2563EB; width: 2px; }
    .vis-custom-time.today > .vis-custom-time-marker {
      background-color: #2563EB; color: #fff;
      font-size: 12px; font-weight: 600;
      border-radius: 6px; padding: 2px 9px;
      box-shadow: 0 2px 6px rgba(37, 99, 235, .35);
      cursor: default;
    }

    /* dialog color swatches */
    .swatches { display: flex; gap: 10px; }
    .swatch {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; padding: 0;
      outline: none; transition: transform .1s ease;
    }
    .swatch:hover { transform: scale(1.08); }
    .swatch.active { border-color: #0F172A; box-shadow: 0 0 0 2px #fff inset; }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <v-app>
      <!-- ================= App bar ================= -->
      <v-app-bar class="app-bar px-6" :elevation="0" height="64">
        <span class="brand">Gantt Chart</span>
        <v-spacer></v-spacer>
        <v-avatar color="#4F46E5" size="36">
          <span class="brand-avatar" style="color:#fff">A</span>
        </v-avatar>
      </v-app-bar>

      <v-main>
        <div class="page">
          <!-- ================= Controls ================= -->
          <div class="controls">
            <!-- 期間 -->
            <div class="ctrl">
              <div class="ctrl-label">期間</div>
              <v-menu v-model="periodMenu" :close-on-content-click="false" location="bottom start">
                <template v-slot:activator="{ props }">
                  <v-text-field
                    v-bind="props"
                    :model-value="periodDisplay"
                    readonly
                    variant="outlined"
                    density="comfortable"
                    prepend-inner-icon="mdi-calendar-blank-outline"
                    hide-details
                    class="period-field"
                  ></v-text-field>
                </template>
                <v-card min-width="300" class="pa-4">
                  <v-text-field type="date" label="開始日" v-model="win.start" variant="outlined" density="compact" hide-details class="mb-3"></v-text-field>
                  <v-text-field type="date" label="終了日" v-model="win.end" variant="outlined" density="compact" hide-details></v-text-field>
                  <div class="d-flex justify-end mt-4" style="gap:8px">
                    <v-btn variant="text" @click="periodMenu = false">閉じる</v-btn>
                    <v-btn color="primary" variant="flat" @click="applyPeriod">適用</v-btn>
                  </div>
                </v-card>
              </v-menu>
            </div>

            <!-- プロジェクト -->
            <div class="ctrl">
              <div class="ctrl-label">プロジェクト</div>
              <v-select
                :items="projectItems"
                v-model="project"
                variant="outlined"
                density="comfortable"
                hide-details
                class="project-select"
              ></v-select>
            </div>

            <!-- タスクを追加 -->
            <div class="ctrl ctrl-action">
              <v-btn color="primary" variant="outlined" prepend-icon="mdi-plus" rounded="lg" class="add-btn" size="large" @click="openAdd">
                タスクを追加
              </v-btn>
            </div>
          </div>

          <!-- ================= Gantt ================= -->
          <v-card class="gantt-card" :elevation="0" rounded="lg">
            <div class="gantt-wrap">
              <div class="col-header" ref="colHeader">
                <div class="ch-cell">タスク名</div>
                <div class="ch-cell">担当者</div>
                <div class="ch-cell">ステータス</div>
              </div>
              <div id="timeline" ref="timelineEl"></div>
            </div>
          </v-card>

          <div class="d-flex align-center mt-3" style="gap:12px; flex-wrap:wrap">
            <span class="text-caption" style="color:#64748B">{{ loadedInfo }}</span>
            <v-chip v-if="loading" size="small" color="primary" variant="tonal" prepend-icon="mdi-progress-download">読み込み中…</v-chip>
            <v-spacer></v-spacer>
            <span class="text-caption" style="color:#94A3B8">下端までスクロールで次の50件を取得 / バーのドラッグで期間変更・ダブルクリックで編集</span>
          </div>
        </div>

        <!-- ================= Add / Edit dialog ================= -->
        <v-dialog v-model="dialog" max-width="480">
          <v-card rounded="lg">
            <v-card-title class="text-h6 pt-5 px-5">{{ form.mode === 'add' ? 'タスクを追加' : 'タスクを編集' }}</v-card-title>
            <v-card-text class="px-5">
              <v-text-field label="タスク名" v-model="form.name" variant="outlined" density="comfortable" :error="showError && !form.name.trim()" :error-messages="(showError && !form.name.trim()) ? 'タスク名を入力してください' : ''"></v-text-field>
              <v-text-field label="担当者" v-model="form.assignee" variant="outlined" density="comfortable"></v-text-field>
              <div class="d-flex" style="gap:12px">
                <v-select label="ステータス" :items="statusItems" v-model="form.status" variant="outlined" density="comfortable" style="flex:1"></v-select>
                <v-combobox label="プロジェクト" :items="projectOptions" v-model="form.project" variant="outlined" density="comfortable" style="flex:1"></v-combobox>
              </div>
              <div class="d-flex" style="gap:12px">
                <v-text-field type="date" label="開始日" v-model="form.start" variant="outlined" density="comfortable" style="flex:1"></v-text-field>
                <v-text-field type="date" label="終了日" v-model="form.end" variant="outlined" density="comfortable" style="flex:1"></v-text-field>
              </div>
              <div class="ctrl-label" style="margin-bottom:8px">バーの色</div>
              <div class="swatches">
                <button v-for="c in colors" :key="c.value" type="button" class="swatch" :class="{ active: form.color === c.value }" :style="{ background: c.value }" :title="c.name" @click="form.color = c.value"></button>
              </div>
            </v-card-text>
            <v-card-actions class="px-5 pb-4">
              <v-btn v-if="form.mode === 'edit'" color="error" variant="text" @click="removeTask">削除</v-btn>
              <v-spacer></v-spacer>
              <v-btn variant="text" @click="dialog = false">キャンセル</v-btn>
              <v-btn color="primary" variant="flat" @click="saveTask">{{ form.mode === 'add' ? '追加' : '保存' }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>
      </v-main>
    </v-app>
  </div>

  <!-- ================= Scripts ================= -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@4/dist/vuetify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vis-timeline@8/standalone/umd/vis-timeline-graph2d.min.js"></script>

  <script>
    const { createApp, ref, reactive, computed, watch, onMounted, nextTick } = Vue;
    const { createVuetify } = Vuetify;

    const vuetify = createVuetify({
      theme: {
        defaultTheme: 'light',
        themes: {
          light: {
            colors: {
              primary: '#2563EB',
              error: '#EF4444',
            },
          },
        },
      },
    });

    /* ---------- constants ---------- */
    const COLORS = [
      { name: 'グリーン', value: '#22C55E' },
      { name: 'ブルー', value: '#3B82F6' },
      { name: 'パープル', value: '#A855F7' },
      { name: 'オレンジ', value: '#F97316' },
      { name: 'レッド', value: '#F87171' },
      { name: 'ティール', value: '#14B8A6' },
    ];
    const STATUS_ITEMS = ['未着手', '進行中', '完了'];

    /* ---------- helpers ---------- */
    const pad = (n) => String(n).padStart(2, '0');
    function fmtDate(d) {
      const x = new Date(d);
      return `${x.getFullYear()}-${pad(x.getMonth() + 1)}-${pad(x.getDate())}`;
    }
    function addDay(str, n = 1) {
      const d = new Date(str + 'T00:00:00');
      d.setDate(d.getDate() + n);
      return fmtDate(d);
    }
    const toStart = (str) => new Date(str + 'T00:00:00');
    const toEndExclusive = (str) => new Date(addDay(str, 1) + 'T00:00:00');
    const slash = (str) => str.split('-').join('/');
    const chipKey = (s) => (s === '完了' ? 'done' : s === '進行中' ? 'doing' : 'todo');

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }
    function groupContent(t) {
      const ck = chipKey(t.status);
      return (
        '<div class="row-grid">' +
        '<div class="rg-cell rg-name">' + escapeHtml(t.name) + '</div>' +
        '<div class="rg-cell rg-assignee">' + escapeHtml(t.assignee || '') + '</div>' +
        '<div class="rg-cell rg-status"><span class="chip chip-' + ck + '">' + escapeHtml(t.status) + '</span></div>' +
        '</div>'
      );
    }
    function itemFromTask(t) {
      return {
        id: t.id,
        group: t.id,
        start: toStart(t.start),
        end: toEndExclusive(t.end),
        type: 'range',
        content: '',
        style: 'background-color:' + t.color + ';',
      };
    }
    function weekendItems(startStr, endStr) {
      const items = [];
      const cur = new Date(startStr + 'T00:00:00');
      const end = new Date(endStr + 'T00:00:00');
      let i = 0;
      while (cur <= end) {
        const day = cur.getDay();
        if (day === 0 || day === 6) {
          const s = new Date(cur);
          const e = new Date(cur);
          e.setDate(e.getDate() + 1);
          items.push({ id: 'wknd-' + i++, start: s, end: e, type: 'background', className: 'weekend-bg' });
        }
        cur.setDate(cur.getDate() + 1);
      }
      return items;
    }

    /* ---------- infinite scroll config + simulated data source ---------- */
    const PAGE_SIZE = 50;     // 1ページあたりの取得件数
    const MAX_LOADED = 100;   // 同時にDOMへ保持する最大件数（超えたら遠い側を破棄）
    const TOTAL_TASKS = 500;  // バックエンドが保持している総件数（擬似サーバ）

    const ASSIGNEES = ['山田 太郎', '鈴木 一郎', '田中 健一', '伊藤 翔', '佐藤 美咲', '高橋 直樹', '渡辺 結衣', '小林 大輔'];
    const PHASES = ['要件定義', '基本設計', '詳細設計', '実装', '単体テスト', '結合テスト', '受入テスト', 'リリース', 'レビュー', 'ドキュメント整備'];

    function buildPool() {
      const seed = [
        { name: '要件定義', assignee: '山田 太郎', status: '完了',   start: '2024-05-20', end: '2024-05-28', color: '#22C55E' },
        { name: '設計',     assignee: '鈴木 一郎', status: '進行中', start: '2024-05-24', end: '2024-06-10', color: '#3B82F6' },
        { name: '実装',     assignee: '田中 健一', status: '未着手', start: '2024-06-04', end: '2024-06-20', color: '#A855F7' },
        { name: 'テスト',   assignee: '伊藤 翔',   status: '未着手', start: '2024-06-16', end: '2024-06-23', color: '#F97316' },
        { name: 'リリース', assignee: '山田 太郎', status: '未着手', start: '2024-06-23', end: '2024-06-25', color: '#F87171' },
      ];
      const pool = [];
      seed.forEach((t, i) => pool.push({ id: i + 1, order: i, project: '新システム開発', ...t }));
      for (let i = seed.length; i < TOTAL_TASKS; i++) {
        const startOffset = (i * 7) % 37;        // 0〜36日（表示期間内に分布）
        const start = addDay('2024-05-20', startOffset);
        const dur = 3 + (i % 9);                  // 3〜11日
        pool.push({
          id: i + 1,
          order: i,
          name: PHASES[i % PHASES.length] + ' ' + String(i + 1),
          assignee: ASSIGNEES[i % ASSIGNEES.length],
          status: STATUS_ITEMS[i % STATUS_ITEMS.length],
          project: '新システム開発',
          start,
          end: addDay(start, dur),
          color: COLORS[i % COLORS.length].value,
        });
      }
      return pool;
    }
    const ALL_TASKS = buildPool();

    /* ---------- app ---------- */
    createApp({
      setup() {
        // 擬似サーバの全データ（これ自体はレンダリングしない）
        const allTasks = ALL_TASKS;
        // 現在DOMに読み込んでいるウィンドウの先頭インデックス（allTasks上の位置）
        const windowStart = ref(0);
        // 実際に表示している（＝DataSetへ流す）タスク。これがウィンドウ。
        const tasks = reactive([]);
        // ダイアログで追加するタスク用の衝突しないID採番
        let newIdCounter = allTasks.length + 100000;
        // 読み込み中ガード（多重発火・スクロール補正用）
        const loading = ref(false);
        let scrollEl = null; // 縦スクロールが起きている要素のキャッシュ

        // 初期ページ（先頭50件）を読み込む
        allTasks.slice(0, PAGE_SIZE).forEach((t) => tasks.push(t));

        const project = ref('すべて');
        const win = reactive({ start: '2024-05-20', end: '2024-06-30' });
        const periodMenu = ref(false);
        const dialog = ref(false);
        const showError = ref(false);
        const form = reactive({ mode: 'add', id: null, name: '', assignee: '', status: '未着手', project: '新システム開発', start: '', end: '', color: COLORS[0].value });

        const colHeader = ref(null);
        const timelineEl = ref(null);

        // non-reactive timeline state
        let timeline = null;
        let itemsDS = null;
        let groupsDS = null;
        let suppressSync = false;

        const periodDisplay = computed(() => `${slash(win.start)} ～ ${slash(win.end)}`);
        const projectItems = computed(() => ['すべて', ...Array.from(new Set(tasks.map((t) => t.project)))]);
        const projectOptions = computed(() => Array.from(new Set(tasks.map((t) => t.project))));
        const statusItems = STATUS_ITEMS;

        const matchProject = (t) => project.value === 'すべて' || t.project === project.value;

        // 現在の表示範囲インジケータ
        const loadedInfo = computed(() =>
          tasks.length
            ? `${windowStart.value + 1}〜${windowStart.value + tasks.length} 件目を表示 / 全 ${allTasks.length} 件　（1ページ ${PAGE_SIZE} 件・最大保持 ${MAX_LOADED} 件）`
            : '表示できるタスクがありません'
        );

        // タスク → vis グループ（order で縦の並び順を固定する）
        const buildGroup = (t) => ({ id: t.id, content: groupContent(t), visible: matchProject(t), order: t.order });

        function syncHeader() {
          const container = timelineEl.value;
          if (!container) return;
          const left = container.querySelector('.vis-panel.vis-left');
          const top = container.querySelector('.vis-panel.vis-top');
          if (left && top && colHeader.value) {
            colHeader.value.style.width = left.offsetWidth + 'px';
            colHeader.value.style.height = top.offsetHeight + 'px';
          }
        }

        function openAdd() {
          showError.value = false;
          const usedColors = tasks.map((t) => t.color);
          const next = COLORS.find((c) => !usedColors.includes(c.value)) || COLORS[tasks.length % COLORS.length];
          Object.assign(form, {
            mode: 'add', id: null, name: '', assignee: '', status: '未着手',
            project: project.value !== 'すべて' ? project.value : (projectOptions.value[0] || '新システム開発'),
            start: win.start, end: addDay(win.start, 6), color: next.value,
          });
          dialog.value = true;
        }

        function openEdit(id) {
          const t = tasks.find((x) => x.id === id);
          if (!t) return;
          showError.value = false;
          Object.assign(form, { mode: 'edit', id: t.id, name: t.name, assignee: t.assignee, status: t.status, project: t.project, start: t.start, end: t.end, color: t.color });
          dialog.value = true;
        }

        function saveTask() {
          if (!form.name.trim()) { showError.value = true; return; }
          if (form.end < form.start) { const tmp = form.start; form.start = form.end; form.end = tmp; }
          const proj = (form.project || '未分類').toString().trim() || '未分類';

          if (form.mode === 'add') {
            const id = newIdCounter++;
            const maxOrder = tasks.reduce((m, t) => Math.max(m, t.order || 0), 0);
            const t = { id, order: maxOrder + 1, name: form.name.trim(), assignee: form.assignee.trim(), status: form.status, project: proj, start: form.start, end: form.end, color: form.color };
            tasks.push(t);
            suppressSync = true;
            groupsDS.add(buildGroup(t));
            itemsDS.add(itemFromTask(t));
            suppressSync = false;
          } else {
            const t = tasks.find((x) => x.id === form.id);
            Object.assign(t, { name: form.name.trim(), assignee: form.assignee.trim(), status: form.status, project: proj, start: form.start, end: form.end, color: form.color });
            suppressSync = true;
            groupsDS.update({ id: t.id, content: groupContent(t), visible: matchProject(t) });
            itemsDS.update(itemFromTask(t));
            suppressSync = false;
          }
          dialog.value = false;
          nextTick(syncHeader);
        }

        function removeTask() {
          const id = form.id;
          const idx = tasks.findIndex((x) => x.id === id);
          if (idx >= 0) tasks.splice(idx, 1);
          suppressSync = true;
          groupsDS.remove(id);
          itemsDS.remove(id);
          suppressSync = false;
          dialog.value = false;
          nextTick(syncHeader);
        }

        function applyPeriod() {
          if (win.end < win.start) { const tmp = win.start; win.start = win.end; win.end = tmp; }
          timeline.setWindow(toStart(win.start), toEndExclusive(win.end));
          timeline.setOptions({ min: toStart(addDay(win.start, -2)), max: toEndExclusive(addDay(win.end, 2)) });
          suppressSync = true;
          const old = itemsDS.getIds().filter((id) => typeof id === 'string' && id.startsWith('wknd-'));
          itemsDS.remove(old);
          itemsDS.add(weekendItems(win.start, win.end));
          suppressSync = false;
          periodMenu.value = false;
          nextTick(syncHeader);
        }

        function applyFilter() {
          suppressSync = true;
          tasks.forEach((t) => groupsDS.update({ id: t.id, visible: matchProject(t) }));
          suppressSync = false;
          nextTick(syncHeader);
        }
        watch(project, applyFilter);

        /* ---------- 無限スクロール ---------- */
        // 下方向：末尾に到達 → 次の PAGE_SIZE 件を読み込み、超過分は先頭(=一番遠い)から破棄
        function loadNext(el) {
          if (loading.value) return;
          const loadedEnd = windowStart.value + tasks.length; // allTasks上の排他終端
          if (loadedEnd >= allTasks.length) return;            // もう無い
          loading.value = true;

          const rowH = el && tasks.length ? el.scrollHeight / tasks.length : 0;
          const add = allTasks.slice(loadedEnd, loadedEnd + PAGE_SIZE);

          suppressSync = true;
          add.forEach((t) => tasks.push(t));
          groupsDS.add(add.map(buildGroup));
          itemsDS.add(add.map(itemFromTask));

          // 最大保持件数を超えたら、現在地から遠い側（先頭）を破棄
          let removed = 0;
          const over = tasks.length - MAX_LOADED;
          if (over > 0) {
            const dropped = tasks.splice(0, over);
            windowStart.value += over;
            const ids = dropped.map((t) => t.id);
            groupsDS.remove(ids);
            itemsDS.remove(ids);
            removed = over;
          }
          suppressSync = false;

          // 先頭を削ると上方向に詰まって見た目が飛ぶので、削った高さ分だけスクロール位置を戻す
          // （vis の再描画完了後に補正したいので二重 rAF）
          requestAnimationFrame(() => requestAnimationFrame(() => {
            if (el && removed && rowH) {
              el.scrollTop = Math.max(0, el.scrollTop - removed * rowH);
            }
            syncHeader();
            setTimeout(() => { loading.value = false; }, 60);
          }));
        }

        // 上方向：先頭に到達 → 前の PAGE_SIZE 件を読み込み、超過分は末尾(=一番遠い)から破棄
        function loadPrev(el) {
          if (loading.value) return;
          if (windowStart.value <= 0) return;
          loading.value = true;

          const rowH = el && tasks.length ? el.scrollHeight / tasks.length : 0;
          const from = Math.max(0, windowStart.value - PAGE_SIZE);
          const add = allTasks.slice(from, windowStart.value);
          const addedCount = add.length;

          suppressSync = true;
          for (let i = add.length - 1; i >= 0; i--) tasks.unshift(add[i]);
          windowStart.value = from;
          groupsDS.add(add.map(buildGroup));
          itemsDS.add(add.map(itemFromTask));

          const over = tasks.length - MAX_LOADED;
          if (over > 0) {
            const dropped = tasks.splice(tasks.length - over, over);
            const ids = dropped.map((t) => t.id);
            groupsDS.remove(ids);
            itemsDS.remove(ids);
          }
          suppressSync = false;

          // 先頭に積んだ分だけ下にずれるので、その高さ分スクロール位置を進めて見た目を維持
          requestAnimationFrame(() => requestAnimationFrame(() => {
            if (el && addedCount && rowH) {
              el.scrollTop = el.scrollTop + addedCount * rowH;
            }
            syncHeader();
            setTimeout(() => { loading.value = false; }, 60);
          }));
        }

        const SCROLL_THRESHOLD = 60; // 端から何pxで発火するか
        function onVScroll(e) {
          const el = e.target;
          if (!el || typeof el.scrollTop !== 'number') return;
          if (el.scrollHeight - el.clientHeight < 4) return; // 縦スクロールしない要素は無視
          scrollEl = el;
          const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight <= SCROLL_THRESHOLD;
          const nearTop = el.scrollTop <= SCROLL_THRESHOLD;
          if (nearBottom) loadNext(el);
          else if (nearTop) loadPrev(el);
        }

        onMounted(() => {
          const container = timelineEl.value;
          if (typeof vis === 'undefined' || !vis.Timeline) {
            container.innerHTML = '<div class="load-error">タイムライン ライブラリを読み込めませんでした。<br>このHTMLファイルをブラウザで直接開いてご確認ください（インターネット接続が必要です）。</div>';
            return;
          }

          groupsDS = new vis.DataSet(tasks.map(buildGroup));
          itemsDS = new vis.DataSet([...tasks.map(itemFromTask), ...weekendItems(win.start, win.end)]);

          const options = {
            start: toStart(win.start),
            end: toEndExclusive(win.end),
            min: toStart(addDay(win.start, -2)),
            max: toEndExclusive(addDay(win.end, 2)),
            orientation: { axis: 'top', item: 'top' },
            stack: false,
            zoomable: false,
            moveable: true,
            selectable: true,
            verticalScroll: true,
            horizontalScroll: false,
            maxHeight: 560,
            groupOrder: (a, b) => a.order - b.order,
            editable: { updateTime: true, updateGroup: false, add: false, remove: false, overrideItems: false },
            margin: { item: { horizontal: 0, vertical: 28 }, axis: 16 },
            timeAxis: { scale: 'day', step: 1 },
            showCurrentTime: false,
            showMajorLabels: true,
            showMinorLabels: true,
            format: {
              minorLabels: function (date) { return String(new Date(+date).getDate()); },
              majorLabels: function (date) { const d = new Date(+date); return d.getFullYear() + '年' + (d.getMonth() + 1) + '月'; },
            },
          };

          timeline = new vis.Timeline(container, itemsDS, groupsDS, options);

          // "今日" marker
          timeline.addCustomTime(new Date('2024-06-03T00:00:00'), 'today');
          timeline.setCustomTimeMarker('今日', 'today', false);

          // edit on double click
          timeline.on('doubleClick', (props) => {
            if (props.item != null && !String(props.item).startsWith('wknd-')) openEdit(props.item);
          });

          // reflect bar drags back into task data
          itemsDS.on('update', (event, props) => {
            if (suppressSync || !props || !props.items) return;
            props.items.forEach((id) => {
              if (typeof id === 'string' && id.startsWith('wknd-')) return;
              const it = itemsDS.get(id);
              const t = tasks.find((x) => x.id === id);
              if (t && it) {
                t.start = fmtDate(it.start);
                const e = new Date(it.end); e.setDate(e.getDate() - 1);
                t.end = fmtDate(e);
              }
            });
          });

          timeline.on('changed', syncHeader);
          // 縦スクロール検知（vis内部のどのパネルがスクロールしてもキャプチャで拾う）
          container.addEventListener('scroll', onVScroll, true);
          window.addEventListener('resize', () => { timeline.redraw(); syncHeader(); });
          nextTick(() => setTimeout(syncHeader, 0));
        });

        return {
          tasks, project, win, periodMenu, dialog, form, showError,
          colHeader, timelineEl, loadedInfo, loading,
          periodDisplay, projectItems, projectOptions, statusItems, colors: COLORS,
          openAdd, saveTask, removeTask, applyPeriod,
        };
      },
    }).use(vuetify).mount('#app');
  </script>
</body>
</html>
