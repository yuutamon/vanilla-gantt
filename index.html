<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vanilla-gantt Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      background: #fafafa;
      color: #333;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #121212; color: #d4d4d4; }
    }
    h1 { margin-bottom: 16px; font-size: 24px; }
    .controls { margin-bottom: 16px; display: flex; gap: 8px; }
    .view-btn {
      padding: 6px 16px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .view-btn.active {
      background: #4e8af0;
      color: #fff;
      border-color: #4e8af0;
    }
    @media (prefers-color-scheme: dark) {
      .view-btn { background: #2a2a2a; border-color: #555; color: #d4d4d4; }
      .view-btn.active { background: #4e8af0; border-color: #4e8af0; color: #fff; }
    }
    #gantt {
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>
  <h1>vanilla-gantt Demo</h1>
  <div class="controls">
    <button class="view-btn active" data-mode="day">Day</button>
    <button class="view-btn" data-mode="week">Week</button>
    <button class="view-btn" data-mode="month">Month</button>
  </div>
  <div id="gantt"></div>
  <script type="module" src="/demo/main.ts"></script>
</body>
</html>
